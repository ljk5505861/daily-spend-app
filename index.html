<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>消费记录器</title>
<style>
:root{
  --bg:#f3f6fb;
  --card:#ffffff;
  --text:#111827;
  --sub:#6b7280;
  --line:#e5e7eb;
  --accent:#2563eb;
  --good:#059669;
  --warn:#dc2626;
  --shadow:0 10px 30px rgba(0,0,0,.06);
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
}
.wrap{
  max-width:920px;
  margin:0 auto;
  padding:16px 14px 40px;
}
.title{
  font-size:30px;
  font-weight:800;
  margin:4px 2px 4px;
}
.date-line{
  font-size:15px;
  color:var(--sub);
  margin:0 2px 14px;
}
.card{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}
.section-title{
  font-size:19px;
  font-weight:800;
  margin:0 0 14px;
}
.hero-main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.hero-subgrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:12px;
}
.income-row{
  grid-template-columns:1fr;
}
.hero-stats{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  margin-top:12px;
}
.hero-item{
  background:#f8fbff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px 14px;
  min-width:0;
  overflow:hidden;
}
.hero-item.main{
  padding:18px 16px;
}
.hero-label{
  font-size:18px;
  font-weight:800;
  color:#1f2937;
  margin-bottom:10px;
}
.hero-label.sub{
  font-size:15px;
  font-weight:700;
  color:#334155;
  margin-bottom:8px;
}
.hero-value{
  line-height:1.05;
  font-weight:900;
  letter-spacing:-.5px;
  white-space:nowrap;
  overflow:hidden;
}

.top-stat-value{
  font-size:42px;
}

.budget-value{
  font-size:42px;
}

.top-stat-value.digits-4{
  font-size:34px;
}
.top-stat-value.digits-5{
  font-size:28px;
}
.top-stat-value.digits-6{
  font-size:24px;
}
.top-stat-value.wan-value{
  font-size:30px;
}
.top-stat-value.wan-value.long-wan{
  font-size:22px;
}
.hero-sub{
  margin-top:8px;
  font-size:12px;
  color:var(--sub);
}
.status{
  margin-top:12px;
  border-radius:14px;
  padding:12px 14px;
  font-size:14px;
  font-weight:700;
}
.status.ok{
  background:#ecfdf5;
  color:#065f46;
}
.status.warn{
  background:#fef2f2;
  color:#991b1b;
}
label{
  display:block;
  font-size:13px;
  color:var(--sub);
  margin-bottom:6px;
}
input,button,select{
  font:inherit;
}
input[type="text"],input[type="number"],input[type="color"],select{
  width:100%;
  padding:14px 14px;
  border:1px solid #d1d5db;
  border-radius:14px;
  background:#fff;
  outline:none;
}
input[type="text"]:focus,input[type="number"]:focus,input[type="color"]:focus,select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(37,99,235,.12);
}
input[type="color"]{
  padding:8px;
  height:52px;
}
input[readonly]{
  background:#f8fafc;
}
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.row>div{
  flex:1;
  min-width:140px;
}
.btn{
  border:0;
  border-radius:14px;
  padding:13px 16px;
  font-weight:800;
  cursor:pointer;
}
.btn.primary{
  background:var(--accent);
  color:#fff;
}
.btn.gray{
  background:#edf2f7;
  color:#111827;
}
.btn.danger{
  background:#fee2e2;
  color:#991b1b;
}
.btn.small{
  padding:9px 12px;
  border-radius:12px;
  font-size:13px;
}
.btn.big{
  width:100%;
  padding:16px 18px;
  font-size:18px;
  border-radius:16px;
}
.quick-notes{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}
.note-chip{
  border:1px solid var(--line);
  background:#fff;
  border-radius:999px;
  padding:9px 13px;
  font-size:13px;
  cursor:pointer;
}
.note-tip{
  margin-top:8px;
  font-size:12px;
  color:var(--sub);
}
.setting-box{
  display:none;
  margin-top:12px;
  padding-top:12px;
  border-top:1px dashed var(--line);
}
.setting-box.show{ display:block; }
.list{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.item{
  display:flex;
  justify-content:space-between;
  gap:12px;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
  background:#fff;
}
.item-left{
  min-width:0;
}
.item-title{
  font-size:15px;
  font-weight:700;
  margin-bottom:4px;
  word-break:break-all;
}
.item-sub{
  font-size:12px;
  color:var(--sub);
}
.item-amount{
  white-space:nowrap;
  font-size:18px;
  font-weight:800;
}
.item-actions{
  display:flex;
  gap:8px;
  margin-top:8px;
  flex-wrap:wrap;
}
.empty{
  color:var(--sub);
  font-size:14px;
  text-align:center;
  padding:8px 0 2px;
}
.footer-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}
.history-day{
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  margin-bottom:12px;
  background:#fbfdff;
}
.history-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  margin-bottom:10px;
}
.history-date{
  font-size:15px;
  font-weight:800;
}
.history-total{
  font-size:14px;
  font-weight:800;
  color:#1e3a8a;
}
.history-row{
  border-top:1px dashed var(--line);
  padding:10px 0;
}
.history-row:first-of-type{ border-top:0; }
.history-row-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
}
.small{
  font-size:12px;
  color:var(--sub);
}
.tabs{
  display:flex;
  gap:8px;
  margin-bottom:12px;
  flex-wrap:wrap;
}
.tab-btn{
  border:1px solid var(--line);
  background:#fff;
  color:#111827;
  border-radius:999px;
  padding:9px 14px;
  font-weight:700;
  cursor:pointer;
}
.tab-btn.active{
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}
.tab-panel{
  display:none;
}
.tab-panel.show{ display:block; }
.chart-wrap{
  overflow-x:auto;
}
.chart-range{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px;
}
.range-btn{
  border:1px solid var(--line);
  background:#fff;
  color:#111827;
  border-radius:999px;
  padding:8px 12px;
  font-weight:700;
  cursor:pointer;
}
.range-btn.active{
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}
.chart{
  display:flex;
  align-items:flex-end;
  gap:10px;
  min-height:240px;
  padding:10px 4px 4px;
}
.bar-col{
  width:42px;
  flex:0 0 42px;
  text-align:center;
}
.bar-value{
  font-size:11px;
  color:var(--sub);
  margin-bottom:6px;
  min-height:16px;
}
.bar{
  width:100%;
  border-radius:10px 10px 4px 4px;
  background:linear-gradient(180deg,#60a5fa,#2563eb);
  min-height:4px;
}
.bar-label{
  font-size:11px;
  color:var(--sub);
  margin-top:8px;
  word-break:break-all;
}
.budget-line-tip{
  margin-top:10px;
  font-size:12px;
  color:var(--sub);
}
.summary-box{
  border:1px solid var(--line);
  border-radius:16px;
  background:#fbfdff;
  padding:14px;
  line-height:1.8;
}
.search-box{
  margin-bottom:12px;
}
.icon-badge{
  font-size:18px;
  margin-right:6px;
}
.pie-grid{
  display:grid;
  grid-template-columns:220px 1fr;
  gap:16px;
  align-items:center;
}
.pie-wrap{
  display:flex;
  justify-content:center;
}
.pie-legend{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.legend-row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 12px;
  background:#fff;
}
.legend-left{
  display:flex;
  gap:8px;
  align-items:center;
}
.modal-mask{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
  z-index:1000;
}
.modal-mask.show{ display:flex; }
.modal{
  background:#fff;
  border-radius:20px;
  width:min(560px,100%);
  padding:16px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}
@media (max-width:700px){
  .hero-stats{ grid-template-columns:1fr; }
  .pie-grid{ grid-template-columns:1fr; }
}
@media (max-width:560px){
  .title{font-size:26px}
  .top-stat-value{font-size:36px}
  .budget-value{font-size:36px}
  .hero-label{font-size:17px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">消费记录器</div>
  <div class="date-line" id="dateLine"></div>

  <div class="card">
    <div class="hero-main">
      <div class="hero-item main">
        <div class="hero-label">今日已花</div>
        <div class="hero-value top-stat-value" id="todaySpent">¥0</div>
        <div class="hero-sub">今天所有记录合计</div>
      </div>
      <div class="hero-item main">
        <div class="hero-label">本月已花</div>
        <div class="hero-value top-stat-value" id="monthSpent">¥0</div>
        <div class="hero-sub">当前月份累计</div>
      </div>
    </div>

        <div class="hero-subgrid">
      <div class="hero-item">
        <div class="hero-label sub">本月已存</div>
        <div class="hero-value top-stat-value" id="monthSaved">¥0</div>
        <div class="hero-sub">本月收入 - 本月支出</div>
      </div>
      <div class="hero-item">
        <div class="hero-label sub">总已存</div>
        <div class="hero-value top-stat-value" id="totalSaved">¥0</div>
        <div class="hero-sub">总收入 - 总支出</div>
      </div>
    </div>

        <div class="hero-subgrid income-row">
  <div class="hero-item">
    <div class="hero-label sub">本月收入</div>
    <div class="hero-value top-stat-value" id="monthIncome">¥0</div>
    <div class="hero-sub">当前月份收入</div>
  </div>
</div>

    <div class="hero-subgrid" id="budgetGrid" style="display:none">
      <div class="hero-item">
        <div class="hero-label sub">今天还能花</div>
        <div class="hero-value budget-value" id="todayRemain">¥0</div>
        <div class="hero-sub">预算开启后显示</div>
      </div>
      <div class="hero-item">
        <div class="hero-label sub">本月剩余</div>
        <div class="hero-value budget-value" id="monthRemain">¥0</div>
        <div class="hero-sub">预算开启后显示</div>
      </div>
    </div>

    <div id="statusBox" class="status ok" style="display:none"></div>
  </div>

  <div class="card">
    <div class="section-title">快速记一笔</div>
    <div class="row">
      <div>
        <label for="amountInput">金额</label>
        <input id="amountInput" type="number" min="0" step="0.01" placeholder="输入金额">
      </div>
      <div>
        <label for="noteInput">备注</label>
        <input id="noteInput" type="text" placeholder="例如：奶茶、午饭、衣服">
      </div>
    </div>

    <div class="quick-notes" id="noteMemory"></div>
    <div class="note-tip">备注会自动记住。分类和图标会根据备注自动识别。</div>

    <div class="footer-actions">
      <button class="btn primary big" id="addBtn">记账</button>
      <button class="btn gray" id="undoBtn">撤销上一笔</button>
    </div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" data-tab="todayTab">今天记录</button>
      <button class="tab-btn" data-tab="historyTab">历史记录</button>
      <button class="tab-btn" data-tab="chartTab">图表</button>
      <button class="tab-btn" data-tab="analysisTab">分析</button>
      <button class="tab-btn" data-tab="summaryTab">月度总结</button>
    </div>

    <div id="todayTab" class="tab-panel show">
      <div id="todayList" class="list"></div>
      <div id="emptyTodayText" class="empty">今天还没有消费记录。</div>
    </div>

    <div id="historyTab" class="tab-panel">
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="搜索备注，例如：奶茶、衣服、午饭">
      </div>
      <div id="historyList"></div>
      <div id="emptyHistoryText" class="empty">还没有历史记录。</div>
    </div>

    <div id="chartTab" class="tab-panel">
      <div class="chart-range">
        <button class="range-btn active" data-range="7">近7天</button>
        <button class="range-btn" data-range="30">近30天</button>
        <button class="range-btn" data-range="month">本月</button>
      </div>
      <div class="chart-wrap">
        <div class="chart" id="chartBox"></div>
      </div>
      <div class="budget-line-tip" id="chartTip">显示最近 7 天消费总额。</div>
    </div>

    <div id="analysisTab" class="tab-panel">
      <div class="pie-grid">
        <div class="pie-wrap">
          <svg id="pieChart" width="220" height="220" viewBox="0 0 220 220"></svg>
        </div>
        <div class="pie-legend" id="pieLegend"></div>
      </div>
      <div class="budget-line-tip">显示本月分类消费占比。</div>
    </div>

    <div id="summaryTab" class="tab-panel">
      <div class="summary-box" id="summaryBox"></div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">本月收入设置</div>
    <div class="row">
      <div>
        <label>当前月份</label>
        <input id="currentMonthText" type="text" readonly>
      </div>
      <div>
        <label for="incomeInput">本月收入（元）</label>
        <input id="incomeInput" type="number" min="0" step="1" placeholder="例如 5500">
      </div>
    </div>
    <div class="footer-actions">
      <button class="btn primary" id="saveIncomeBtn">保存本月收入</button>
    </div>
  </div>

  <div class="card">
    <div class="row" style="align-items:center">
      <div style="flex:1;min-width:180px">
        <div class="section-title" style="margin:0">设置</div>
      </div>
      <div style="flex:0 0 auto;min-width:auto">
        <button class="btn small gray" id="toggleSettingsBtn">展开 / 收起</button>
      </div>
    </div>

    <div id="settingsBox" class="setting-box">
      <div class="row">
        <div>
          <label>
            <input id="budgetEnabled" type="checkbox" style="width:auto;margin-right:8px;transform:scale(1.1);">
            启用预算功能
          </label>
        </div>
      </div>

      <div id="budgetSettingsArea" style="display:none;margin-top:8px">
        <div class="row">
          <div>
            <label for="budgetInput">本月预算（元）</label>
            <input id="budgetInput" type="number" min="0" step="1" placeholder="例如 800">
          </div>
        </div>
        <div class="footer-actions">
          <button class="btn primary" id="saveBudgetBtn">保存预算</button>
        </div>
      </div>

      <div style="margin-top:14px">
        <div class="section-title" style="font-size:16px;margin-bottom:10px">首页金额颜色</div>

        <div class="row">
          <div>
            <label for="todayColorInput">今日已花颜色</label>
            <input id="todayColorInput" type="color">
          </div>
          <div>
            <label for="monthColorInput">本月已花颜色</label>
            <input id="monthColorInput" type="color">
          </div>
        </div>

        <div class="row" style="margin-top:10px">
          <div>
            <label for="incomeColorInput">本月收入颜色</label>
            <input id="incomeColorInput" type="color">
          </div>
          <div>
            <label for="monthSavedColorInput">本月已存颜色</label>
            <input id="monthSavedColorInput" type="color">
          </div>
        </div>

        <div class="row" style="margin-top:10px">
          <div>
            <label for="totalSavedColorInput">总已存颜色</label>
            <input id="totalSavedColorInput" type="color">
          </div>
        </div>

        <div class="footer-actions">
          <button class="btn primary" id="saveColorsBtn">保存颜色</button>
          <button class="btn gray" id="resetColorsBtn">恢复默认颜色</button>
        </div>
      </div>

      <div class="footer-actions">
        <button class="btn gray" id="exportBtn">导出数据</button>
        <button class="btn gray" id="clearMonthBtn">清空本月记录</button>
      </div>
    </div>
  </div>
</div>

<div id="editModalMask" class="modal-mask">
  <div class="modal">
    <div class="section-title">编辑记录</div>
    <div class="row">
      <div>
        <label for="editAmountInput">金额</label>
        <input id="editAmountInput" type="number" min="0" step="0.01">
      </div>
      <div>
        <label for="editCategoryInput">分类</label>
        <select id="editCategoryInput"></select>
      </div>
    </div>
    <div style="margin-top:10px">
      <label for="editNoteInput">备注</label>
      <input id="editNoteInput" type="text">
    </div>
    <div class="footer-actions">
      <button class="btn primary" id="saveEditBtn">保存修改</button>
      <button class="btn gray" id="cancelEditBtn">取消</button>
      <button class="btn danger" id="deleteEditBtn">删除这条</button>
    </div>
  </div>
</div>

<script>
const KEY = "daily_spend_v5";

const CATEGORY_META = {
  "吃饭": { icon:"🍚", color:"#3b82f6" },
  "饮料零食": { icon:"🥤", color:"#8b5cf6" },
  "交通": { icon:"🚌", color:"#10b981" },
  "日用品": { icon:"🧴", color:"#f59e0b" },
  "衣物": { icon:"👕", color:"#ec4899" },
  "娱乐": { icon:"🎮", color:"#ef4444" },
  "居家杂费": { icon:"📦", color:"#14b8a6" },
  "其他": { icon:"📝", color:"#6b7280" }
};

const DEFAULT_STATE = {
  budgetEnabled:false,
  budget:0,
  items:[],
  noteMemory:[],
  settingsOpen:false,
  activeTab:"todayTab",
  chartRange:"7",
  incomes:{},
  colors:{
    today:"#1d4ed8",
    month:"#7c3aed",
    income:"#111827",
    monthSaved:"#059669",
    totalSaved:"#059669"
  }
};

let saved = {};
try{
  saved = JSON.parse(localStorage.getItem(KEY) || "{}");
}catch(e){
  saved = {};
}

let state = {
  ...DEFAULT_STATE,
  ...saved,
  incomes: { ...(DEFAULT_STATE.incomes||{}), ...(saved.incomes||{}) },
  colors: { ...(DEFAULT_STATE.colors||{}), ...(saved.colors||{}) }
};

state.items = Array.isArray(state.items) ? state.items : [];
state.noteMemory = Array.isArray(state.noteMemory) ? state.noteMemory : [];

let currentEditId = null;

function saveState(){
  localStorage.setItem(KEY, JSON.stringify(state));
}

function now(){
  return new Date();
}

function todayStr(){
  const d = now();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

function monthStr(){
  return todayStr().slice(0,7);
}

function formatDateCN(dateStr){
  const [y,m,d] = dateStr.split("-").map(Number);
  const wk = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
  const dt = new Date(y, m-1, d);
  return `${y}年${m}月${d}日 ${wk[dt.getDay()]}`;
}

function formatMonthCN(month){
  const [y,m] = month.split("-").map(Number);
  return `${y}年${m}月`;
}

function renderDateLine(){
  document.getElementById("dateLine").textContent = formatDateCN(todayStr());
}

function daysLeftInMonth(){
  const d = now();
  const total = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  return total - d.getDate() + 1;
}

function money(n){
  return "¥" + Number(n || 0).toFixed(2).replace(".00","");
}
function statMoney(n){
  const num = Number(n || 0);
  const abs = Math.abs(num);

  if(abs >= 1000000){
    const wan = num / 10000;
    let text = wan.toFixed(1);
    if(text.endsWith(".0")) text = text.slice(0, -2);
    return "¥" + text + "万";
  }

  if(abs >= 100000){
    const wan = num / 10000;
    let text = wan.toFixed(2);
    text = text.replace(/0+$/,"").replace(/\.$/,"");
    return "¥" + text + "万";
  }

  return money(num);
}
function sum(arr){
  return arr.reduce((a,b)=>a + Number(b.amount || 0), 0);
}

function sumIncomes(){
  return Object.values(state.incomes || {}).reduce((a,b)=>a + Number(b || 0), 0);
}

function todayItems(){
  return state.items.filter(i => i.date === todayStr());
}

function monthItems(month = monthStr()){
  return state.items.filter(i => i.date.startsWith(month));
}

function monthIncome(month = monthStr()){
  return Number(state.incomes?.[month] || 0);
}

function totalExpense(){
  return sum(state.items);
}

function totalSaved(){
  return sumIncomes() - totalExpense();
}

function updateNoteMemory(note){
  const text = (note || "").trim();
  if(!text) return;
  state.noteMemory = state.noteMemory.filter(n => n !== text);
  state.noteMemory.unshift(text);
  state.noteMemory = state.noteMemory.slice(0, 12);
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function stripPrefix(text){
  return text
    .replace(/^(淘宝|拼多多|京东|美团|饿了么|抖音|微信|支付宝|线下|超市|便利店)\s*/i, "")
    .trim();
}

function detectCategory(note){
  const raw = (note || "").trim();
  const text = stripPrefix(raw);

  const rules = [
    { category:"吃饭", keys:["早餐","午饭","晚饭","夜宵","米饭","面","粉","菜","外卖","快餐","饭","麻辣烫","炒饭","盖饭","汉堡","肯德基","麦当劳","饺子","馄饨","粥"] },
    { category:"饮料零食", keys:["饮料","奶茶","咖啡","可乐","雪碧","水","矿泉水","茶","柠檬茶","零食","薯片","饼干","辣条","糖","巧克力","冰淇淋","面包","蛋糕","酸奶"] },
    { category:"交通", keys:["公交","地铁","打车","滴滴","车费","交通","单车","电车","高铁","火车","加油","停车"] },
    { category:"日用品", keys:["牙膏","牙刷","洗发水","沐浴露","毛巾","纸","抽纸","卫生纸","洗衣液","肥皂","洗面奶","日用品","湿巾","纸巾"] },
    { category:"衣物", keys:["衣服","裤子","鞋","袜子","外套","T恤","短袖","长裤","拖鞋","帽子","卫衣","衬衫"] },
    { category:"娱乐", keys:["游戏","充值","会员","电影","网吧","KTV","小说","漫画","娱乐","steam","皮肤"] },
    { category:"居家杂费", keys:["话费","电费","水费","房租","快递","运费","杂费","宽带","维修"] }
  ];

  for(const rule of rules){
    if(rule.keys.some(k => raw.includes(k) || text.includes(k))){
      return rule.category;
    }
  }
  return "其他";
}

function enrichItem(item){
  if(!item.category){
    item.category = detectCategory(item.note || "");
  }
  if(!item.icon){
    item.icon = CATEGORY_META[item.category]?.icon || "📝";
  }
  if(!item.id){
    item.id = String(item.time || Date.now()) + Math.random().toString(16).slice(2);
  }
  return item;
}

    if(!el) return;

    el.classList.remove("digits-4","digits-5","digits-6","wan-value","long-wan");

    const text = (el.textContent || "").trim();

    if(text.includes("万")){
  el.classList.add("wan-value");
  if(text.length >= 6){
    el.classList.add("long-wan");
  }
  return;
}

    const pure = text.replace(/[¥\-\.\,]/g, "");

    }else if(len === 5){

function groupByDate(items){
  const map = {};
  items.forEach(item => {
    if(!map[item.date]) map[item.date] = [];
    map[item.date].push(item);
  });
  return Object.entries(map).sort((a,b)=>a[0] < b[0] ? 1 : -1);
}

function getDateStringByOffset(offset){
  const d = new Date();
  d.setDate(d.getDate() - offset);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

function getChartData(){
  const range = state.chartRange || "7";

  if(range === "7" || range === "30"){
    const count = Number(range);
    const arr = [];
    for(let i=count-1;i>=0;i--){
      const ds = getDateStringByOffset(i);
      const items = state.items.filter(it => it.date === ds);
      arr.push({
        date: ds,
        label: ds.slice(5).replace("-","/"),
        total: sum(items)
      });
    }
    return arr;
  }

  if(range === "month"){
    const currentMonth = monthStr();
    const days = new Date(Number(currentMonth.slice(0,4)), Number(currentMonth.slice(5,7)), 0).getDate();
    const arr = [];
    for(let i=1;i<=days;i++){
      const ds = `${currentMonth}-${String(i).padStart(2,"0")}`;
      const items = state.items.filter(it => it.date === ds);
      arr.push({
        date: ds,
        label: String(i),
        total: sum(items)
      });
    }
    return arr;
  }

  return [];
}

function renderChart(){
  const box = document.getElementById("chartBox");
  const tip = document.getElementById("chartTip");
  box.innerHTML = "";

  const data = getChartData();
  const max = Math.max(...data.map(x => x.total), 1);

  data.forEach(item => {
    const col = document.createElement("div");
    col.className = "bar-col";
    const height = Math.max((item.total / max) * 150, item.total > 0 ? 8 : 4);

    col.innerHTML = `
      <div class="bar-value">${item.total > 0 ? money(item.total) : ""}</div>
      <div class="bar" style="height:${height}px"></div>
      <div class="bar-label">${item.label}</div>
    `;
    box.appendChild(col);
  });

  let text = "显示消费总额。";
  if(state.chartRange === "7") text = "显示最近 7 天消费总额。";
  if(state.chartRange === "30") text = "显示最近 30 天消费总额。";

  });
}

function getCategoryTotalsForCurrentMonth(){

  });
  return Object.entries(totals).sort((a,b) => b[1]-a[1]);
}

function renderPie(){
  const svg = document.getElementById("pieChart");
  const legend = document.getElementById("pieLegend");
  svg.innerHTML = "";
  legend.innerHTML = "";

  const entries = getCategoryTotalsForCurrentMonth();
  const total = entries.reduce((a,b) => a + b[1], 0);

  if(!total){
    svg.innerHTML = `
      <circle cx="110" cy="110" r="70" fill="#eef2f7"></circle>
      <text x="110" y="110" text-anchor="middle" dominant-baseline="middle" fill="#6b7280" font-size="14">暂无数据</text>
    `;
    legend.innerHTML = `<div class="empty">本月还没有分类数据。</div>`;
    return;
  }

  let start = 0;
  const r = 70;
  const cx = 110;
  const cy = 110;

  entries.forEach(([category, value]) => {
    const color = CATEGORY_META[category]?.color || "#6b7280";
    const fraction = value / total;
    const end = start + fraction;

    const x1 = cx + r * Math.cos(2 * Math.PI * start - Math.PI / 2);
    const y1 = cy + r * Math.sin(2 * Math.PI * start - Math.PI / 2);
    const x2 = cx + r * Math.cos(2 * Math.PI * end - Math.PI / 2);
    const y2 = cy + r * Math.sin(2 * Math.PI * end - Math.PI / 2);
    const largeArc = fraction > 0.5 ? 1 : 0;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`);
    path.setAttribute("fill", color);
    svg.appendChild(path);

    start = end;
  });

  const hole = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  hole.setAttribute("cx", cx);
  hole.setAttribute("cy", cy);
  hole.setAttribute("r", 38);
  hole.setAttribute("fill", "#fff");
  svg.appendChild(hole);

  const text1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text1.setAttribute("x", cx);
  text1.setAttribute("y", 102);
  text1.setAttribute("text-anchor", "middle");
  text1.setAttribute("fill", "#6b7280");
  text1.setAttribute("font-size", "12");
  text1.textContent = "本月分类";
  svg.appendChild(text1);

  const text2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text2.setAttribute("x", cx);
  text2.setAttribute("y", 122);
  text2.setAttribute("text-anchor", "middle");
  text2.setAttribute("fill", "#111827");
  text2.setAttribute("font-size", "16");
  text2.setAttribute("font-weight", "800");
  text2.textContent = money(total);
  svg.appendChild(text2);

  entries.forEach(([category, value]) => {
    const percent = ((value / total) * 100).toFixed(1);
    const color = CATEGORY_META[category]?.color || "#6b7280";
    const icon = CATEGORY_META[category]?.icon || "📝";

    const row = document.createElement("div");
    row.className = "legend-row";
    row.innerHTML = `
      <div class="legend-left">
        <span>${icon}</span>
        <span>${category}</span>
      </div>
      <div style="text-align:right">
        <div>${money(value)}</div>
        <div class="small" style="color:${color}">${percent}%</div>
      </div>
    `;
    legend.appendChild(row);
  });
}

  const category = detectCategory(note);

  state.items.push({

    time: Date.now(),

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `消费数据-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function openEdit(id){
  const item = state.items.find(i => i.id === id);
  if(!item) return;
  currentEditId = id;
  document.getElementById("editAmountInput").value = item.amount;
  document.getElementById("editNoteInput").value = item.note || "";
  document.getElementById("editCategoryInput").value = item.category || "其他";
  document.getElementById("editModalMask").classList.add("show");
}

function closeEdit(){
  currentEditId = null;
  document.getElementById("editModalMask").classList.remove("show");
}

function saveEdit(){
  if(!currentEditId) return;
  const item = state.items.find(i => i.id === currentEditId);
  if(!item) return;

  const amount = Number(document.getElementById("editAmountInput").value || 0);
  const note = document.getElementById("editNoteInput").value.trim();
  const category = document.getElementById("editCategoryInput").value;

  if(!amount || amount <= 0){
    alert("金额不对");
    return;
  }

  item.amount = Number(amount.toFixed(2));
  item.note = note;
  item.category = category;
  item.icon = CATEGORY_META[category]?.icon || "📝";

  updateNoteMemory(note);
  saveState();
  closeEdit();
  render();
}

function deleteItem(id){
  const ok = confirm("确定删除这条记录吗？");
  if(!ok) return;
  state.items = state.items.filter(i => i.id !== id);
  saveState();
  render();
  if(currentEditId === id) closeEdit();
}

function deleteFromModal(){
  if(!currentEditId) return;
  deleteItem(currentEditId);
}

document.getElementById("addBtn").onclick = addItem;
document.getElementById("undoBtn").onclick = undoLast;
document.getElementById("saveBudgetBtn").onclick = saveBudget;
document.getElementById("saveIncomeBtn").onclick = saveIncome;
document.getElementById("saveColorsBtn").onclick = saveColors;
document.getElementById("resetColorsBtn").onclick = resetColors;
document.getElementById("clearMonthBtn").onclick = clearMonth;
document.getElementById("exportBtn").onclick = exportData;

document.getElementById("toggleSettingsBtn").onclick = () => {
  state.settingsOpen = !state.settingsOpen;
  saveState();
  renderSettings();
};

document.getElementById("budgetEnabled").onchange = (e) => {
  state.budgetEnabled = e.target.checked;
  saveState();
  render();
};

document.getElementById("amountInput").addEventListener("keydown", e => {
  if(e.key === "Enter") addItem();
});
document.getElementById("noteInput").addEventListener("keydown", e => {
  if(e.key === "Enter") addItem();
});
document.getElementById("searchInput").addEventListener("input", renderHistory);

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.onclick = () => {
    state.activeTab = btn.dataset.tab;
    saveState();
    renderTabs();
  };
});

document.querySelectorAll(".range-btn").forEach(btn => {
  btn.onclick = () => {
    state.chartRange = btn.dataset.range;
    saveState();
    renderChart();
  };
});

document.getElementById("saveEditBtn").onclick = saveEdit;
document.getElementById("cancelEditBtn").onclick = closeEdit;
document.getElementById("deleteEditBtn").onclick = deleteFromModal;
document.getElementById("editModalMask").addEventListener("click", (e) => {
  if(e.target.id === "editModalMask") closeEdit();
});

render();
window.openEdit = openEdit;
window.deleteItem = deleteItem;
</script>
</body>
</html>
